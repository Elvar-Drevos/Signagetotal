<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;color:#fff;cursor:none;font-family:'Outfit',sans-serif}
::-webkit-scrollbar{display:none}

body{background:var(--clk-bg,#0a0e17);position:relative}
body::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%,rgba(78,168,222,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 70%,rgba(255,123,46,0.05) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(179,136,255,0.04) 0%,transparent 70%);
  animation:clkBgPulse 20s ease-in-out infinite alternate;
}
@keyframes clkBgPulse{0%{opacity:1;filter:hue-rotate(0deg)}100%{opacity:.7;filter:hue-rotate(15deg)}}

.clk-wrap{position:relative;z-index:1;height:100%;width:100%;display:flex;flex-direction:column;padding:clamp(1.5rem,3vh,3rem);gap:clamp(1rem,2vh,2rem)}
.clk-hdr{display:flex;align-items:center;gap:1rem;padding-bottom:clamp(.5rem,1vh,1rem);border-bottom:1px solid rgba(255,255,255,0.08)}
.clk-hdr .dot{width:8px;height:8px;border-radius:50%;background:#ff7b2e;box-shadow:0 0 12px rgba(255,123,46,0.25);animation:clkPulse 2s ease-in-out infinite}
@keyframes clkPulse{0%,100%{opacity:1}50%{opacity:.4}}
.clk-hdr .lbl{font-size:clamp(.7rem,1.2vw,.95rem);text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,0.45);font-weight:600}
.clk-hdr .dt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:clamp(.65rem,1.1vw,.85rem);color:rgba(255,255,255,0.45);font-weight:300}

.clk-main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:clamp(.5rem,1.5vh,1.5rem)}
.clk-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);padding:.4em 1.2em;border-radius:100px;font-size:clamp(.7rem,1.3vw,1rem);color:rgba(255,255,255,0.45);backdrop-filter:blur(10px)}
.clk-badge svg{width:14px;height:14px;fill:#ff7b2e;flex-shrink:0}
.clk-time{font-family:'JetBrains Mono',monospace;font-size:clamp(4rem,15vw,14rem);font-weight:400;letter-spacing:-.02em;line-height:1;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.65) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.clk-time .sec{font-size:.35em;color:#ff7b2e;-webkit-text-fill-color:#ff7b2e;vertical-align:super;margin-left:.1em;font-weight:300}
.clk-label{font-size:clamp(1rem,2.5vw,2rem);font-weight:300;color:rgba(255,255,255,0.45);letter-spacing:.05em}
.clk-label span{color:#ff7b2e;font-weight:600}

.clk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(.8rem,1.5vw,1.5rem);width:100%;margin-top:auto}
.clk-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:clamp(12px,1.5vw,20px);padding:clamp(1rem,2vw,2rem);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.clk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0;opacity:.8}
.clk-card:nth-child(1)::before{background:#4ea8de}
.clk-card:nth-child(2)::before{background:#6ecf8a}
.clk-card:nth-child(3)::before{background:#b388ff}
.wc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(.4rem,.8vh,.8rem)}
.wc-city{font-size:clamp(.75rem,1.4vw,1.15rem);font-weight:600;letter-spacing:.02em}
.wc-time{font-family:'JetBrains Mono',monospace;font-size:clamp(1.5rem,4vw,3.2rem);font-weight:400;line-height:1.1;margin-bottom:clamp(.2rem,.5vh,.5rem)}
.clk-card:nth-child(1) .wc-time{color:#4ea8de}
.clk-card:nth-child(2) .wc-time{color:#6ecf8a}
.clk-card:nth-child(3) .wc-time{color:#b388ff}
.wc-meta{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.wc-offset{font-family:'JetBrains Mono',monospace;font-size:clamp(.55rem,1vw,.8rem);color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.05);padding:.15em .5em;border-radius:4px}
.wc-ds{font-size:clamp(.55rem,1vw,.75rem);color:rgba(255,255,255,0.45);font-weight:300}
.clk-foot{display:flex;justify-content:center;padding-top:clamp(.3rem,.5vh,.5rem);border-top:1px solid rgba(255,255,255,0.08)}
.clk-foot span{font-size:clamp(.55rem,.9vw,.7rem);color:rgba(255,255,255,0.45);font-weight:300;letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="clk-wrap">
  <div class="clk-hdr">
    <div class="dot"></div>
    <div class="lbl">Live Klok</div>
    <div class="dt" id="clkDateStr"></div>
  </div>
  <div class="clk-main">
    <div class="clk-badge">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
      Zwolle, Overijssel
    </div>
    <div class="clk-time" id="clkMainTime"></div>
    <div class="clk-label">Centraal-Europese <span>Tijd</span></div>
  </div>
  <div class="clk-grid">
    <div class="clk-card">
      <div class="wc-hdr"><span class="wc-city">New York</span></div>
      <div class="wc-time" id="wcT0"></div>
      <div class="wc-meta"><span class="wc-offset" id="wcO0"></span><span class="wc-ds" id="wcD0"></span></div>
    </div>
    <div class="clk-card">
      <div class="wc-hdr"><span class="wc-city">Tokyo</span></div>
      <div class="wc-time" id="wcT1"></div>
      <div class="wc-meta"><span class="wc-offset" id="wcO1"></span><span class="wc-ds" id="wcD1"></span></div>
    </div>
    <div class="clk-card">
      <div class="wc-hdr"><span class="wc-city">Sydney</span></div>
      <div class="wc-time" id="wcT2"></div>
      <div class="wc-meta"><span class="wc-offset" id="wcO2"></span><span class="wc-ds" id="wcD2"></span></div>
    </div>
  </div>
  <div class="clk-foot"><span>Automatisch gesynchroniseerd</span></div>
</div>

<script>
var pad = function(n) { return String(n).padStart(2, '0'); };
var NL_DAYS = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
var NL_MONTHS = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
var EN_DAYS_MAP = {sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
var ZWOLLE_TZ = 'Europe/Amsterdam';

var CLK_CITIES = [
  { tz: 'America/New_York', id: 0 },
  { tz: 'Asia/Tokyo', id: 1 },
  { tz: 'Australia/Sydney', id: 2 }
];

function getOffsetDiff(tz) {
  var now = new Date();
  var fmt = function(t) {
    var s = now.toLocaleString('en-US', { timeZone: t, hour: 'numeric', hour12: false, minute: 'numeric' });
    var p = s.split(':').map(Number);
    return p[0] * 60 + p[1];
  };
  var diff = fmt(tz) - fmt(ZWOLLE_TZ);
  if (diff > 720) diff -= 1440;
  if (diff < -720) diff += 1440;
  var sign = diff >= 0 ? '+' : '';
  var hrs = Math.floor(Math.abs(diff) / 60);
  var mins = Math.abs(diff) % 60;
  return 'UTC' + sign + (diff >= 0 ? '' : '-') + hrs + (mins ? ':' + pad(mins) : '');
}

function getDayState(tz) {
  var h = parseInt(new Date().toLocaleString('en-US', { timeZone: tz, hour: 'numeric', hour12: false }));
  if (h >= 6 && h < 12) return 'Ochtend';
  if (h >= 12 && h < 18) return 'Middag';
  if (h >= 18 && h < 22) return 'Avond';
  return 'Nacht';
}

function updateClock() {
  var now = new Date();
  var h = pad(parseInt(now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, hour: '2-digit', hour12: false })));
  var m = pad(parseInt(now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, minute: '2-digit' })));
  var s = pad(parseInt(now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, second: '2-digit' })));

  document.getElementById('clkMainTime').innerHTML = h + ':' + m + '<span class="sec">' + s + '</span>';

  var dayEn = now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, weekday: 'long' }).toLowerCase();
  var dayIdx = EN_DAYS_MAP[dayEn] || 0;
  var day = now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, day: 'numeric' });
  var monthIdx = parseInt(now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, month: 'numeric' })) - 1;
  var year = now.toLocaleString('en-US', { timeZone: ZWOLLE_TZ, year: 'numeric' });
  document.getElementById('clkDateStr').textContent = NL_DAYS[dayIdx] + ' ' + day + ' ' + NL_MONTHS[monthIdx] + ' ' + year;

  CLK_CITIES.forEach(function(c) {
    var tH = pad(parseInt(now.toLocaleString('en-US', { timeZone: c.tz, hour: '2-digit', hour12: false })));
    var tM = pad(parseInt(now.toLocaleString('en-US', { timeZone: c.tz, minute: '2-digit' })));
    var tS = pad(parseInt(now.toLocaleString('en-US', { timeZone: c.tz, second: '2-digit' })));
    document.getElementById('wcT' + c.id).textContent = tH + ':' + tM + ':' + tS;
    document.getElementById('wcO' + c.id).textContent = getOffsetDiff(c.tz);
    document.getElementById('wcD' + c.id).textContent = getDayState(c.tz);
  });
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
