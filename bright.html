<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Bright</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow: hidden; }
  
  #wrapper { width: 100vw; height: 100vh; position: relative; }

  .news-slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 60px; background-size: cover; background-position: center;
  }

  /* Donkere overlay in plaats van zware blur voor meer snelheid */
  .content-box {
    background: rgba(0, 0, 0, 0.75);
    padding: 40px; border-left: 8px solid #f5a623;
    max-width: 80%; z-index: 2;
  }

  .bright-logo-fixed {
    position: absolute; top: 40px; left: 40px;
    background: #f5a623; padding: 10px 20px;
    font-weight: 900; color: #000; font-size: 24px;
  }

  h1 { font-size: 48px; margin-bottom: 20px; line-height: 1.1; }
  p { font-size: 22px; opacity: 0.9; line-height: 1.4; }
</style>
</head>
<body>
  <div id="wrapper">
    <div class="bright-logo-fixed">BRIGHT</div>
    <div id="content">
        <div class="news-slide" style="background-image: url('https://www.bright.nl/static/bright/images/placeholder.png')">
            <div class="content-box">
                <h1 id="title">Laden...</h1>
                <p id="desc">Nieuws wordt opgehaald.</p>
            </div>
         </div>
    </div>
  </div>

<script>
async function fetchBright() {
  try {
    const response = await fetch('https://api.allorigins.win/raw?url=https://www.bright.nl/rss/index.xml');
    const text = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");
    const item = xml.querySelector("item");
    
    document.getElementById('title').textContent = item.querySelector("title").textContent;
    document.getElementById('desc').textContent = item.querySelector("description").textContent.split('<')[0];
    
    // Probeer afbeelding te vinden
    const media = item.getElementsByTagName('enclosure')[0] || item.getElementsByTagName('media:content')[0];
    if(media) {
        document.querySelector('.news-slide').style.backgroundImage = `url('${media.getAttribute('url')}')`;
    }
  } catch (e) { console.error(e); }
}

fetchBright();
// Ververs elke minuut zolang de slide open staat
setInterval(fetchBright, 60000);
</script>
</body>
</html>
