<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage Shell</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;cursor:none}
::-webkit-scrollbar{display:none}
.frame{position:absolute;top:0;left:0;width:100%;height:calc(100vh - 80px);border:none;background:#000;will-change:opacity;transition:opacity 1s ease-in-out}
#ticker{position:absolute;bottom:0;left:0;width:100%;height:80px;border:none;background:#0A0A0C}
</style>
</head>
<body>
<iframe id="fA" class="frame" src="about:blank"></iframe>
<iframe id="fB" class="frame" src="about:blank" style="opacity:0"></iframe>
<iframe id="ticker" src="Ticker.html"></iframe>
<script>
var CONFIG = {
  playlist: [
    { url: "clock.html",              duration: 10000 },
    { url: "weather-v2.html",         duration: 10000 },
    { url: "trein.html",              duration: 15000 },
    { url: "spoor.html",              duration: 15000 },
    { url: "bus.html",                duration: 10000 },
    { url: "nos.html",                dynamic: true, maxWait: 90000 },
    { url: "nyt.html",                dynamic: true, maxWait: 90000 },
    { url: "Geschiedenis update.html", duration: 15000 },
    { url: "sky.html",                dynamic: true, maxWait: 90000 },
    { url: "bright.html",             dynamic: true, maxWait: 90000 }
  ],
  transitionMs: 1000
};

var fA = document.getElementById('fA');
var fB = document.getElementById('fB');
var active = fA, standby = fB;
var idx = 0, timer = null, loadTimer = null;

// Listen for "done" signal from news iframes
window.addEventListener('message', function(e) {
  if (e.data === 'slideComplete') {
    console.log('[Shell] Received slideComplete signal');
    clearTimeout(timer);
    next();
  }
});

function show(i) {
  clearTimeout(timer);
  clearTimeout(loadTimer);
  var item = CONFIG.playlist[i];
  idx = i;
  console.log('[Shell] Loading:', item.url);

  standby.src = item.url;

  // Timeout: if page doesn't load in 10s, skip
  loadTimer = setTimeout(function() {
    console.warn('[Shell] Load timeout, skipping:', item.url);
    next();
  }, 10000);

  standby.onload = function() {
    clearTimeout(loadTimer);
    standby.onload = null;
    console.log('[Shell] Showing:', item.url);

    // Crossfade
    standby.style.opacity = '1';
    active.style.opacity = '0';

    var prev = active;
    active = standby;
    standby = prev;

    // Blank the hidden iframe after transition
    setTimeout(function() {
      standby.src = 'about:blank';
    }, CONFIG.transitionMs + 200);

    // Schedule next: fixed duration or wait for signal (with safety max)
    if (item.dynamic) {
      timer = setTimeout(function() {
        console.warn('[Shell] Max wait reached for:', item.url);
        next();
      }, item.maxWait || 60000);
    } else {
      timer = setTimeout(next, item.duration);
    }
  };
}

function next() {
  show((idx + 1) % CONFIG.playlist.length);
}

setTimeout(function() { show(0); }, 1000);
</script>
</body>
</html>
