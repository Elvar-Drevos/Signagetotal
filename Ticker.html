<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:80px;overflow:hidden;background:#0A0A0C;color:#fff;cursor:none;font-family:'Outfit',sans-serif}
::-webkit-scrollbar{display:none}

.tk-bar{width:100%;height:80px;display:flex;align-items:stretch;background:linear-gradient(180deg,#131316 0%,#0A0A0C 100%);border-top:2px solid rgba(232,93,26,0.5);position:relative}
.tk-bar::before{content:'';position:absolute;top:-12px;left:0;right:0;height:12px;background:linear-gradient(180deg,transparent 0%,rgba(232,93,26,0.08) 100%);pointer-events:none}

.tk-logo{display:flex;align-items:center;gap:12px;padding:0 26px;background:linear-gradient(135deg,#E85D1A 0%,#C94D12 100%);position:relative;z-index:5;flex-shrink:0;min-width:130px}
.tk-logo::after{content:'';position:absolute;right:-30px;top:0;height:100%;width:30px;background:linear-gradient(90deg,rgba(0,0,0,0.6),transparent);z-index:4}
.tk-logo-text{font-weight:900;font-size:28px;letter-spacing:5px;color:white;text-shadow:0 1px 2px rgba(0,0,0,0.2)}
.tk-live{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);padding:2px 8px 2px 6px;border-radius:10px}
.tk-live-dot{width:6px;height:6px;background:white;border-radius:50%;animation:tkPulse 2s ease-in-out infinite}
.tk-live-text{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.9);text-transform:uppercase}
@keyframes tkPulse{0%,100%{opacity:1}50%{opacity:0.2}}

.tk-slide-block{position:relative;overflow:hidden;flex-shrink:0;height:80px}
.tk-slide-panel{position:absolute;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;will-change:transform,opacity;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.4s ease}
.tk-slide-panel.tk-visible{transform:translateY(0%);opacity:1}
.tk-slide-panel.tk-hidden-above{transform:translateY(-100%);opacity:0}
.tk-slide-panel.tk-hidden-below{transform:translateY(100%);opacity:0}

.tk-info{width:155px;border-right:1px solid rgba(255,255,255,0.06);background:linear-gradient(180deg,rgba(255,255,255,0.02) 0%,transparent 100%)}
.tk-info .tk-slide-panel{flex-direction:column}
.tk-clock-time{font-weight:700;font-size:28px;color:#F0F0EA;letter-spacing:2px;line-height:1.1;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
.tk-clock-date{font-weight:400;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;margin-top:3px;text-transform:capitalize}
.tk-weather-row{display:flex;align-items:center;gap:7px;line-height:1.2}
.tk-weather-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.tk-weather-icon svg{width:24px;height:24px}
.tk-weather-temp{font-weight:700;font-size:26px;color:#F0F0EA}
.tk-weather-desc{font-weight:400;font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}
.tk-weather-loc{font-weight:600;font-size:9px;color:rgba(255,255,255,0.15);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}

.tk-sep{width:1px;align-self:stretch;background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.03) 100%);flex-shrink:0}

.tk-news{flex:1 1 auto}
.tk-news .tk-slide-panel{justify-content:flex-start;padding:0 0 0 24px}
.tk-thumb{width:96px;height:58px;border-radius:5px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}
.tk-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.tk-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,0.08);background:linear-gradient(135deg,rgba(232,93,26,0.06),rgba(42,127,255,0.03))}
.tk-news-info{flex:1;min-width:0;padding:0 24px 0 16px;display:flex;flex-direction:column;justify-content:center}
.tk-news-counter{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#E85D1A;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tk-news-counter-dot{width:4px;height:4px;background:#E85D1A;border-radius:50%;flex-shrink:0}
.tk-news-title{font-weight:600;font-size:16px;color:#EEEEE8;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tk-news-time{font-size:10px;font-weight:400;color:rgba(255,255,255,0.2);margin-top:3px}

.tk-np-section{display:flex;align-items:stretch;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.06)}
.tk-np-label{width:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px;position:relative;overflow:hidden;border-right:1px solid rgba(255,255,255,0.04)}
.tk-np-label .tk-slide-panel{flex-direction:column}
.tk-np-label-text{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.25);line-height:1.4;text-align:center}
.tk-np-label-hl{color:rgba(255,255,255,0.5);font-size:10px;letter-spacing:2px}

.sbfm-inner{display:flex;align-items:center;gap:8px;position:relative;width:100%;height:100%;justify-content:center}
.sbfm-inner canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.sbfm-body{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.sbfm-eq{display:flex;align-items:center;justify-content:center;gap:2px;height:22px}
.sbfm-eq .b{width:3px;border-radius:2px;animation:sbBounce 0.5s ease-in-out infinite alternate}
@keyframes sbBounce{0%{transform:scaleY(0.15)}100%{transform:scaleY(1)}}
.sbfm-name{font-weight:900;font-size:13px;letter-spacing:1px;line-height:1;background:linear-gradient(90deg,#FF2D87,#FF6B2B,#FFD600,#FF2D87);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sbGrad 3s linear infinite}
@keyframes sbGrad{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.sbfm-fm{font-size:7px;font-weight:700;letter-spacing:2.5px;color:#00D4FF;border:1px solid rgba(0,212,255,0.35);padding:1px 5px;border-radius:4px;animation:sbPulse 2s ease-in-out infinite alternate}
@keyframes sbPulse{0%{opacity:0.5}100%{opacity:1}}

.tk-np-block{width:360px;height:80px;flex-shrink:0;position:relative;overflow:hidden;background:#0A0A0C}
.tk-np-scaler{width:800px;height:200px;transform:scale(0.4);transform-origin:top left;position:absolute;top:0;left:0;background:#0A0A0C}
.tk-np-scaler iframe{width:100%;height:100%;border:none;display:block;background:#0A0A0C}
</style>
</head>
<body>
<div class="tk-bar">
  <div class="tk-logo">
    <span class="tk-logo-text">NOS</span>
    <div class="tk-live"><span class="tk-live-dot"></span><span class="tk-live-text">Live</span></div>
  </div>
  <div class="tk-slide-block tk-info">
    <div class="tk-slide-panel tk-visible" id="tkPanelClock">
      <div class="tk-clock-time" id="tkClockTime">--:--</div>
      <div class="tk-clock-date" id="tkClockDate"></div>
    </div>
    <div class="tk-slide-panel tk-hidden-below" id="tkPanelWeather">
      <div class="tk-weather-row">
        <span class="tk-weather-icon" id="tkWIcon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#FFB800" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg></span>
        <span class="tk-weather-temp" id="tkWTemp">--</span>
      </div>
      <div class="tk-weather-desc" id="tkWDesc"></div>
      <div class="tk-weather-loc">Zwolle</div>
    </div>
  </div>
  <div class="tk-sep"></div>
  <div class="tk-slide-block tk-news">
    <div class="tk-slide-panel tk-visible" id="tkNewsA">
      <div class="tk-thumb" id="tkThumbA"><div class="tk-thumb-ph">--</div></div>
      <div class="tk-news-info">
        <div class="tk-news-counter" id="tkCounterA"><span class="tk-news-counter-dot"></span>Laden...</div>
        <div class="tk-news-title" id="tkTitleA">NOS Nieuws wordt opgehaald...</div>
        <div class="tk-news-time" id="tkTimeA"></div>
      </div>
    </div>
    <div class="tk-slide-panel tk-hidden-below" id="tkNewsB">
      <div class="tk-thumb" id="tkThumbB"><div class="tk-thumb-ph">--</div></div>
      <div class="tk-news-info">
        <div class="tk-news-counter" id="tkCounterB"><span class="tk-news-counter-dot"></span></div>
        <div class="tk-news-title" id="tkTitleB"></div>
        <div class="tk-news-time" id="tkTimeB"></div>
      </div>
    </div>
  </div>
  <div class="tk-sep"></div>
  <div class="tk-np-section">
    <div class="tk-np-label tk-slide-block">
      <div class="tk-slide-panel tk-visible" id="tkNpLabelNP">
        <span class="tk-np-label-text">NOW</span>
        <span class="tk-np-label-text tk-np-label-hl">PLAYING</span>
      </div>
      <div class="tk-slide-panel tk-hidden-below" id="tkNpLabelSB">
        <div class="sbfm-inner">
          <canvas id="sbfmCanvas"></canvas>
          <div class="sbfm-body">
            <div class="sbfm-eq" id="sbfmEq"></div>
            <div class="sbfm-name">SWEET BEATS</div>
            <span class="sbfm-fm">FM</span>
          </div>
        </div>
      </div>
    </div>
    <div class="tk-np-block" id="tkNpBlock">
      <div class="tk-np-scaler" id="tkNpScaler">
        <iframe id="tkNpIframe" src="https://beta.nowplaying.site/HvbaiOSqF7kCdhO0" allow="autoplay; encrypted-media" scrolling="no"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
var PROXY = 'https://api.allorigins.win/raw?url=';
var WX_LAT = 52.5168, WX_LON = 6.083;
var WX_WMO = {0:{d:'Onbewolkt',n:'Helder'},1:{d:'Licht bewolkt',n:'Licht bewolkt'},2:{d:'Half bewolkt',n:'Half bewolkt'},3:{d:'Bewolkt',n:'Bewolkt'},45:{d:'Mist',n:'Mist'},48:{d:'Rijpmist',n:'Rijpmist'},51:{d:'Lichte motregen',n:'Lichte motregen'},53:{d:'Motregen',n:'Motregen'},55:{d:'Dichte motregen',n:'Dichte motregen'},56:{d:'IJzel (licht)',n:'IJzel (licht)'},57:{d:'IJzel',n:'IJzel'},61:{d:'Lichte regen',n:'Lichte regen'},63:{d:'Regen',n:'Regen'},65:{d:'Zware regen',n:'Zware regen'},66:{d:'IJsregen (licht)',n:'IJsregen (licht)'},67:{d:'IJsregen',n:'IJsregen'},71:{d:'Lichte sneeuw',n:'Lichte sneeuw'},73:{d:'Sneeuw',n:'Sneeuw'},75:{d:'Zware sneeuw',n:'Zware sneeuw'},77:{d:'Sneeuwkorrels',n:'Sneeuwkorrels'},80:{d:'Lichte buien',n:'Lichte buien'},81:{d:'Buien',n:'Buien'},82:{d:'Zware buien',n:'Zware buien'},85:{d:'Lichte sneeuwbuien',n:'Lichte sneeuwbuien'},86:{d:'Sneeuwbuien',n:'Sneeuwbuien'},95:{d:'Onweer',n:'Onweer'},96:{d:'Onweer met hagel',n:'Onweer met hagel'},99:{d:'Zwaar onweer',n:'Zwaar onweer'}};

var TK_WMO_SVG = {
  0: '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#FFB800" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  3: '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#AAB" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>',
  63: '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke-width="2"><path d="M16 13V4a4 4 0 0 0-8 0v1H6a4 4 0 0 0 0 8h10a3 3 0 0 0 0-6z" stroke="#AAB" fill="none"/><line x1="8" y1="19" x2="8" y2="21" stroke="#5B9BD5"/><line x1="12" y1="17" x2="12" y2="21" stroke="#5B9BD5"/><line x1="16" y1="19" x2="16" y2="21" stroke="#5B9BD5"/></svg>',
  95: '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke-width="2"><path d="M16 13V4a4 4 0 0 0-8 0v1H6a4 4 0 0 0 0 8h10a3 3 0 0 0 0-6z" stroke="#AAB" fill="none"/><polyline points="13 16 11 20 15 20 12 24" stroke="#FFD700" fill="none"/></svg>',
  73: '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke-width="2"><path d="M16 13V4a4 4 0 0 0-8 0v1H6a4 4 0 0 0 0 8h10a3 3 0 0 0 0-6z" stroke="#AAB" fill="none"/><circle cx="8" cy="19" r="1" fill="#cde"/><circle cx="12" cy="17" r="1" fill="#cde"/><circle cx="16" cy="20" r="1" fill="#cde"/></svg>'
};

function tkWeatherSvg(code) {
  if ([0,1,2].includes(code)) return TK_WMO_SVG[0];
  if ([3,45,48].includes(code)) return TK_WMO_SVG[3];
  if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return TK_WMO_SVG[63];
  if ([95,96,99].includes(code)) return TK_WMO_SVG[95];
  if ([71,73,75,77,85,86].includes(code)) return TK_WMO_SVG[73];
  return TK_WMO_SVG[0];
}
function tkWeatherDesc(code) { var wmo = WX_WMO[code]; return wmo ? wmo.d : 'Onbekend'; }

// RSS
function parseRSSItems(xml) {
  var doc = new DOMParser().parseFromString(xml, 'text/xml');
  return Array.from(doc.querySelectorAll('item')).map(function(item) {
    var get = function(tag) { var el = item.querySelector(tag); return el ? el.textContent : ''; };
    var img = '';
    var media = item.querySelector('content[url], thumbnail[url]');
    if (media) img = media.getAttribute('url');
    if (!img) { var enc = item.querySelector('enclosure[url]'); if (enc && (enc.getAttribute('type') || '').startsWith('image')) img = enc.getAttribute('url'); }
    if (!img) { var m = get('description').match(/<img[^>]+src="([^"]+)"/); if (m) img = m[1]; }
    var tmp = document.createElement('div'); tmp.innerHTML = get('description');
    return { title: get('title'), description: tmp.textContent || '', pubDate: get('pubDate'), image: img, category: get('category') || 'Nieuws' };
  });
}

function fetchRSS(url) {
  return fetch(PROXY + encodeURIComponent(url))
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(xml) { var items = parseRSSItems(xml); if (items.length) return items; throw new Error('No items'); })
    .catch(function(e) {
      console.warn('allorigins failed:', e.message);
      return fetch('https://api.rss2json.com/v1/api.json?count=10&rss_url=' + encodeURIComponent(url))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.items && data.items.length) {
            return data.items.map(function(item) {
              var tmp = document.createElement('div'); tmp.innerHTML = item.description;
              var imgUrl = item.thumbnail || (item.enclosure ? item.enclosure.link : '') || '';
              if (!imgUrl) { var m = (item.description || '').match(/<img[^>]+src="([^"]+)"/); if (m) imgUrl = m[1]; }
              return { title: item.title, description: tmp.textContent || '', pubDate: item.pubDate, image: imgUrl, category: item.categories ? item.categories[0] : 'Nieuws' };
            });
          }
          return [];
        });
    })
    .catch(function(e) { console.warn('RSS fetch failed:', e.message); return []; });
}

// State
var tkNewsItems = [];
var tkNewsIdx = 0;
var tkShowClock = true;
var tkUseA = true;
var tkCycleCount = 0;
var TK_CYCLE_MS = 5000;
var TK_WEATHER_EVERY = 4;
var tkWeatherOK = false;

function tkSlideSwap(out, inn) {
  out.className = 'tk-slide-panel tk-hidden-above';
  inn.className = 'tk-slide-panel tk-hidden-below';
  setTimeout(function() { inn.className = 'tk-slide-panel tk-visible'; }, 50);
}

function tkSetSlot(s, i) {
  var it = tkNewsItems[i]; if (!it) return;
  document.getElementById('tkCounter' + s).innerHTML = '<span class="tk-news-counter-dot"></span>' + (i + 1) + ' / ' + tkNewsItems.length + '  \u00b7  ' + (it.category || 'Nieuws');
  document.getElementById('tkTitle' + s).textContent = it.title;
  var pubDate = it.pubDate;
  try { var d = new Date(pubDate); if (isNaN(d)) document.getElementById('tkTime' + s).textContent = '';
    else { var m = Math.floor((Date.now() - d) / 60000); if (m < 1) document.getElementById('tkTime' + s).textContent = 'zojuist'; else if (m < 60) document.getElementById('tkTime' + s).textContent = m + ' min geleden'; else { var h = Math.floor(m / 60); if (h < 24) document.getElementById('tkTime' + s).textContent = h + ' uur geleden'; else document.getElementById('tkTime' + s).textContent = d.toLocaleDateString('nl-NL', {day: 'numeric', month: 'short'}); } }
  } catch(e) { document.getElementById('tkTime' + s).textContent = ''; }
  var th = document.getElementById('tkThumb' + s);
  th.innerHTML = it.image ? '<img src="' + it.image + '" alt="" onerror="this.parentElement.innerHTML=\'<div class=tk-thumb-ph>--</div>\'">' : '<div class="tk-thumb-ph">--</div>';
}

function tkCycle() {
  tkCycleCount++;
  if (tkWeatherOK && tkCycleCount % TK_WEATHER_EVERY === 0) {
    var pc = document.getElementById('tkPanelClock'), pw = document.getElementById('tkPanelWeather');
    if (tkShowClock) tkSlideSwap(pc, pw); else tkSlideSwap(pw, pc);
    tkShowClock = !tkShowClock;
  }
  if (tkNewsItems.length > 0) {
    tkNewsIdx = (tkNewsIdx + 1) % tkNewsItems.length;
    var inS = tkUseA ? 'A' : 'B', outS = tkUseA ? 'B' : 'A';
    tkSetSlot(inS, tkNewsIdx);
    tkSlideSwap(document.getElementById('tkNews' + outS), document.getElementById('tkNews' + inS));
    tkUseA = !tkUseA;
  }
}

// Clock
function updateClock() {
  var now = new Date();
  document.getElementById('tkClockTime').textContent = now.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('tkClockDate').textContent = now.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'short' });
}

// Weather
function loadWeather() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=' + WX_LAT + '&longitude=' + WX_LON + '&current=temperature_2m,weather_code&timezone=Europe%2FAmsterdam')
    .then(function(r) { return r.json(); })
    .then(function(w) {
      var code = w.current.weather_code;
      document.getElementById('tkWIcon').innerHTML = tkWeatherSvg(code);
      document.getElementById('tkWTemp').textContent = Math.round(w.current.temperature_2m) + '\u00B0C';
      document.getElementById('tkWDesc').textContent = tkWeatherDesc(code);
      tkWeatherOK = true;
    }).catch(function(e) { console.error('[Ticker] Weather error:', e); });
}

// NP scaler
function tkFitNP() {
  var b = document.getElementById('tkNpBlock'), s = document.getElementById('tkNpScaler');
  if (!b || !s) return;
  var vW = 760, vH = 160, sc = Math.min(b.offsetWidth / vW, b.offsetHeight / vH);
  s.style.width = vW + 'px'; s.style.height = vH + 'px';
  s.style.transform = 'scale(' + sc + ')'; s.style.transformOrigin = 'top left';
}

// Sweet Beats FM
(function() {
  var eq = document.getElementById('sbfmEq');
  var cols = ['#FF2D87','#FF6B2B','#FFD600','#00D4FF','#7B2FFF','#FF2D87','#FF6B2B'];
  var hts = [10,16,8,20,12,18,9];
  for (var i = 0; i < 7; i++) {
    var b = document.createElement('div'); b.className = 'b';
    b.style.height = hts[i] + 'px';
    b.style.background = 'linear-gradient(180deg,' + cols[i] + ',' + cols[(i+2)%7] + ')';
    b.style.animationDelay = (i * 0.06) + 's';
    b.style.animationDuration = (0.3 + Math.random() * 0.4) + 's';
    eq.appendChild(b);
  }
  var cv = document.getElementById('sbfmCanvas'), cx = cv.getContext('2d');
  function rsz() { cv.width = cv.offsetWidth; cv.height = cv.offsetHeight; }
  rsz();
  var pts = [], pc = ['#FF2D87','#FF6B2B','#FFD600','#00D4FF','#7B2FFF'];
  for (var i = 0; i < 12; i++) pts.push({x:Math.random()*200,y:Math.random()*100,r:Math.random()*1.2+0.3,dx:(Math.random()-0.5)*0.25,dy:(Math.random()-0.5)*0.15,c:pc[i%5],a:Math.random()*0.25+0.08,p:Math.random()*6.28,ps:0.012+Math.random()*0.01});
  function drw() {
    cx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(function(p) { p.x+=p.dx;p.y+=p.dy;p.p+=p.ps;if(p.x<-2)p.x=cv.width+2;if(p.x>cv.width+2)p.x=-2;if(p.y<-2)p.y=cv.height+2;if(p.y>cv.height+2)p.y=-2;var al=p.a*(0.5+0.5*Math.sin(p.p));cx.globalAlpha=al;cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.28);cx.fillStyle=p.c;cx.fill(); });
    cx.globalAlpha=1;requestAnimationFrame(drw);
  }
  drw();
})();

// NP label toggle

setInterval(function() {
  var lNP = document.getElementById('tkNpLabelNP'), lSB = document.getElementById('tkNpLabelSB');
  if (tkNpShowNP) tkSlideSwap(lNP, lSB); else tkSlideSwap(lSB, lNP);

setInterval(function() {
  var iframe = document.getElementById('tkNpIframe');
  if (iframe) { var src = iframe.src; iframe.src = 'about:blank'; setTimeout(function() { iframe.src = src; }, 1000); }
}, 60 * 60 * 1000);

setInterval(updateClock, 1000);

loadWeather();

});
setInterval(function() {

}, 300000);

tkFitNP();
setInterval(tkCycle, TK_CYCLE_MS);
document.getElementById('tkNpIframe').addEventListener('load', function() { setTimeout(tkFitNP, 500); });
