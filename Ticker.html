<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker Strip</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0A0A0C; width: 100vw; height: 80px; overflow: hidden;
    font-family: 'Outfit', sans-serif;
  }
  .ticker-bar {
    width: 100%; height: 80px; display: flex; align-items: stretch;
    background: #0A0A0C; border-top: 2px solid #E85D1A; position: relative;
  }
  /* Logo & Live Badge */
  .logo-block { width: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; border-right: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 10; }
  .nos-text { font-weight: 900; font-size: 32px; letter-spacing: -1px; color: #fff; line-height: 1; }
  .live-badge { background: #FF2D00; color: #fff; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-top: 4px; text-transform: uppercase; }

  /* Nieuws Track */
  .news-container { flex: 1; overflow: hidden; display: flex; align-items: center; position: relative; background: rgba(255,255,255,0.02); }
  .news-track { display: flex; white-space: nowrap; align-items: center; padding-left: 20px; animation: ticker-scroll 60s linear infinite; }
  @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .tk-news-item { display: flex; align-items: center; margin-right: 50px; color: #eee; font-size: 18px; font-weight: 500; }
  .tk-news-dot { width: 6px; height: 6px; background: #E85D1A; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }

  /* Now Playing / Radio */
  .np-block { width: 350px; background: #000; display: flex; align-items: center; padding: 0 20px; border-left: 1px solid rgba(255,255,255,0.1); }
  .sbfm-label { color: #f5a623; font-weight: 800; font-size: 14px; margin-right: 15px; white-space: nowrap; }
  canvas { width: 150px; height: 40px; }
</style>
</head>
<body>
  <div class="ticker-bar">
    <div class="logo-block">
      <span class="nos-text">NOS</span>
      <span class="live-badge">Live</span>
    </div>
    <div class="news-container">
      <div id="tkNewsTrack" class="news-track">
        </div>
    </div>
    <div class="np-block">
      <span class="sbfm-label">SWEET BEATS FM</span>
      <canvas id="sbfmCanvas"></canvas>
    </div>
  </div>

<script>
async function fetchAllNews() {
  try {
    const response = await fetch('https://api.allorigins.win/raw?url=https://feeds.nos.nl/nosnieuwsalgemeen');
    const text = await response.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");
    const items = xml.querySelectorAll("item");
    const container = document.getElementById('tkNewsTrack');
    
    let html = '';
    // We herhalen de items 2x voor een oneindige loop
    const itemsArr = Array.from(items).slice(0, 15);
    const content = itemsArr.map(item => `
      <div class="tk-news-item">
        <span class="tk-news-dot"></span>
        <span>${item.querySelector("title").textContent}</span>
      </div>
    `).join('');
    
    container.innerHTML = content + content;
  } catch (e) { console.error("News error", e); }
}

// Simpele visualizer voor de Pi
function startVisualizer() {
  const cv = document.getElementById('sbfmCanvas');
  const cx = cv.getContext('2d');
  function drw() {
    cx.clearRect(0,0,cv.width,cv.height);
    cx.fillStyle = '#f5a623';
    for(let i=0; i<15; i++) {
      let h = Math.random() * 30;
      cx.fillRect(i*10, 40-h, 6, h);
    }
    setTimeout(() => requestAnimationFrame(drw), 100);
  }
  drw();
}

fetchAllNews();
setInterval(fetchAllNews, 300000);
startVisualizer();
</script>
</body>
</html>
