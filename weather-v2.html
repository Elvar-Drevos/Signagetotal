<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#0a0e17;color:#fff;cursor:none;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{display:none}

.wx-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;transition:opacity 2s ease}
.wx-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,0.25) 0%,rgba(0,0,0,0.10) 25%,rgba(0,0,0,0.20) 55%,rgba(0,0,0,0.60) 100%)}
.wx-vignette{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse 85% 75% at 50% 45%,transparent 50%,rgba(0,0,0,0.4) 100%)}
#wxFx{position:absolute;inset:0;z-index:2;pointer-events:none}

.wx-app{position:relative;z-index:3;height:100%;width:100%;display:grid;grid-template-rows:auto 1fr auto auto;padding:clamp(1.2rem,2.5vh,2.5rem) clamp(1.2rem,3vw,3rem);gap:clamp(.6rem,1.5vh,1.5rem);color:#fff}
.wx-hdr{display:flex;align-items:center;gap:.7rem}
.wx-hdr-dot{width:7px;height:7px;border-radius:50%;background:#ffa44f;box-shadow:0 0 10px rgba(255,164,79,.5);animation:wxBlink 2.5s ease-in-out infinite}
@keyframes wxBlink{0%,100%{opacity:1}50%{opacity:.3}}
.wx-hdr-tag{font-size:clamp(.6rem,1vw,.78rem);text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.55);font-weight:600}
.wx-hdr-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.wx-hdr-date{font-family:'Space Mono',monospace;font-size:clamp(.55rem,.9vw,.72rem);color:rgba(255,255,255,.45);font-weight:400}
.wx-hdr-loc{display:flex;align-items:center;gap:.3rem;font-size:clamp(.6rem,1vw,.78rem);color:rgba(255,255,255,.55);font-weight:500}
.wx-hdr-loc svg{width:12px;height:12px;fill:#ffa44f;flex-shrink:0}

.wx-hero{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:clamp(.15rem,.6vh,.5rem);text-align:center}
.wx-hero-icon{width:clamp(56px,10vw,110px);height:clamp(56px,10vw,110px);filter:drop-shadow(0 6px 25px rgba(0,0,0,.35))}
.wx-hero-temp{font-family:'Space Mono',monospace;font-size:clamp(5rem,17vw,15rem);font-weight:700;line-height:.88;letter-spacing:-.04em;text-shadow:0 4px 60px rgba(0,0,0,.3)}
.wx-hero-desc{font-size:clamp(1rem,2.5vw,1.8rem);font-weight:300;color:rgba(255,255,255,.85);letter-spacing:.02em}
.wx-hero-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(.3rem,.8vw,.6rem);margin-top:clamp(.2rem,.4vh,.4rem)}
.wx-chip{display:inline-flex;align-items:center;gap:.25rem;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);border-radius:100px;padding:.22em .7em;font-size:clamp(.52rem,.95vw,.72rem);color:rgba(255,255,255,.7);backdrop-filter:blur(16px);font-weight:400}

.wx-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(.4rem,.9vw,.9rem)}
.wx-card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:clamp(12px,1.4vw,18px);padding:clamp(.6rem,1.3vw,1.3rem);backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;gap:.2rem;text-align:center}
.wx-card-label{font-size:clamp(.46rem,.82vw,.65rem);text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);font-weight:600}
.wx-card-icon{font-size:clamp(1rem,2vw,1.6rem);line-height:1;width:1.4em;height:1.4em;display:flex;align-items:center;justify-content:center}
.wx-card-icon svg{width:100%;height:100%}
.wx-card-val{font-family:'Space Mono',monospace;font-size:clamp(.85rem,1.8vw,1.5rem);font-weight:700}
.wx-card-sub{font-size:clamp(.42rem,.72vw,.58rem);color:rgba(255,255,255,.5);font-weight:400}

.wx-hourly{display:flex;flex-direction:column;gap:clamp(.25rem,.4vh,.4rem)}
.wx-hourly-title{font-size:clamp(.5rem,.82vw,.7rem);text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.5);font-weight:600}
.wx-hourly-track{display:grid;grid-template-columns:repeat(10,1fr);gap:clamp(.25rem,.5vw,.5rem)}
.wx-hcell{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:clamp(10px,1.2vw,14px);padding:clamp(.3rem,.6vw,.6rem) clamp(.15rem,.3vw,.3rem);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;gap:.1rem;text-align:center}
.wx-hcell.now{border-color:#ffa44f;background:rgba(255,164,79,0.14)}
.wx-hc-t{font-family:'Space Mono',monospace;font-size:clamp(.4rem,.72vw,.58rem);color:rgba(255,255,255,.5)}
.wx-hc-i{width:clamp(16px,1.6vw,24px);height:clamp(16px,1.6vw,24px)}
.wx-hc-i svg{width:100%;height:100%}
.wx-hc-tmp{font-family:'Space Mono',monospace;font-size:clamp(.58rem,1.1vw,.9rem);font-weight:700}
.wx-hc-r{font-size:clamp(.36rem,.62vw,.5rem);color:#6ec6ff;font-weight:400}

  wxParts = []; wxPType = type;
  var w = wxCvs.width || 1920, h = wxCvs.height || 1000;
  if (type === 'rain') for (var i = 0; i < 100; i++) wxParts.push({x:Math.random()*w,y:Math.random()*h,l:Math.random()*16+8,s:Math.random()*5+4,o:Math.random()*.25+.12});
  else if (type === 'heavyRain') for (var i = 0; i < 200; i++) wxParts.push({x:Math.random()*w,y:Math.random()*h,l:Math.random()*22+10,s:Math.random()*8+6,o:Math.random()*.3+.18});
  else if (type === 'snow') for (var i = 0; i < 70; i++) wxParts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*3+1,s:Math.random()*.8+.2,d:Math.random()*Math.PI*2,o:Math.random()*.45+.25});
  else if (type === 'fog') for (var i = 0; i < 6; i++) wxParts.push({x:Math.random()*w,y:Math.random()*h*.5+h*.25,r:Math.random()*180+120,s:Math.random()*.25+.08,o:Math.random()*.05+.015,dx:Math.random()>.5?1:-1});
}

function wxDrw() {
  var cw = wxCvs.width, ch = wxCvs.height;
  wxCtx.clearRect(0, 0, cw, ch);
  if (wxPType === 'rain' || wxPType === 'heavyRain') wxParts.forEach(function(p) { wxCtx.beginPath(); wxCtx.moveTo(p.x, p.y); wxCtx.lineTo(p.x - 1.2, p.y + p.l); wxCtx.strokeStyle = 'rgba(180,210,240,' + p.o + ')'; wxCtx.lineWidth = 1; wxCtx.stroke(); p.y += p.s; p.x -= .25; if (p.y > ch) { p.y = -p.l; p.x = Math.random() * cw; } });
  else if (wxPType === 'snow') wxParts.forEach(function(p) { p.d += .008; wxCtx.beginPath(); wxCtx.arc(p.x + Math.sin(p.d) * 25, p.y, p.r, 0, Math.PI * 2); wxCtx.fillStyle = 'rgba(255,255,255,' + p.o + ')'; wxCtx.fill(); p.y += p.s; if (p.y > ch) { p.y = -8; p.x = Math.random() * cw; } });
  else if (wxPType === 'fog') wxParts.forEach(function(p) { wxCtx.beginPath(); var g = wxCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r); g.addColorStop(0, 'rgba(200,210,220,' + p.o + ')'); g.addColorStop(1, 'rgba(200,210,220,0)'); wxCtx.fillStyle = g; wxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2); wxCtx.fill(); p.x += p.s * p.dx; if (p.x > cw + p.r) p.x = -p.r; if (p.x < -p.r) p.x = cw + p.r; });
  wxRaf = requestAnimationFrame(wxDrw);
}

var wxCurBg = null;
function wxSetBg(url) {
  if (url === wxCurBg) return;
  wxCurBg = url;
  var img = new Image();
  img.onload = function() {
    var n = document.getElementById('wxBgNext'), c = document.getElementById('wxBgCur');
    n.style.backgroundImage = 'url(' + url + ')'; n.style.opacity = '1';
    setTimeout(function() { c.style.backgroundImage = 'url(' + url + ')'; n.style.opacity = '0'; }, 2200);
  };
  img.src = url;
}

function wxIsDayNow(sr, ss) {
  var now = new Date();
  var h = parseInt(now.toLocaleString('en-US', {timeZone: ZWOLLE_TZ, hour: '2-digit', hour12: false}));
  var m = parseInt(now.toLocaleString('en-US', {timeZone: ZWOLLE_TZ, minute: '2-digit'}));
  var t = h * 60 + m;
  var sp = sr.split(':').map(Number), ep = ss.split(':').map(Number);
  return t >= (sp[0] * 60 + sp[1]) && t < (ep[0] * 60 + ep[1]);
}

function wxIsHDay(s, sr, ss) {
  var h = parseInt(s.split('T')[1].split(':')[0]);
  var sh = parseInt(sr.split(':')[0]), eh = parseInt(ss.split(':')[0]);
  return h >= sh && h < eh;
}

function wxAqT(v) { if (v <= 20) return 'Uitstekend'; if (v <= 40) return 'Goed'; if (v <= 60) return 'Matig'; if (v <= 80) return 'Slecht'; return 'Zeer slecht'; }
function wxViT(k) { if (k >= 10) return 'Helder'; if (k >= 4) return 'Matig'; if (k >= 1) return 'Beperkt'; return 'Slecht'; }

function loadWeather() {
  Promise.all([
    fetch('https://api.open-meteo.com/v1/forecast?latitude=' + WX_LAT + '&longitude=' + WX_LON + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,visibility&hourly=temperature_2m,weather_code,precipitation_probability&daily=sunrise,sunset&timezone=Europe%2FAmsterdam&forecast_days=2'),
    fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + WX_LAT + '&longitude=' + WX_LON + '&current=european_aqi&timezone=Europe%2FAmsterdam')
  ]).then(function(resps) {
    return Promise.all([resps[0].json(), resps[1].json()]);
  }).then(function(data) {
    var w = data[0], a = data[1], c = w.current;
    var sr = w.daily.sunrise[0].split('T')[1], ss = w.daily.sunset[0].split('T')[1];
    var day = wxIsDayNow(sr, ss), code = c.weather_code, wmo = WX_WMO[code] || WX_WMO[0];

    wxSetBg(wxPhotoUrl(code, day));

    var pt = wxPFor(code);
    if (wxRaf) cancelAnimationFrame(wxRaf);
    wxMkParts(pt);
    if (pt !== 'none') wxDrw(); else wxCtx.clearRect(0, 0, wxCvs.width, wxCvs.height);

    var now = new Date();
    var dayEn = now.toLocaleString('en-US', {timeZone: ZWOLLE_TZ, weekday: 'long'}).toLowerCase();
    var dI = EN_DAYS_MAP[dayEn] || 0;
    var dN = now.toLocaleString('en-US', {timeZone: ZWOLLE_TZ, day: 'numeric'});
    var mI = parseInt(now.toLocaleString('en-US', {timeZone: ZWOLLE_TZ, month: 'numeric'})) - 1;
    document.getElementById('wxDateStr').textContent = NL_DAYS[dI] + ' ' + dN + ' ' + NL_MONTHS[mI];

    document.getElementById('wxHeroIcon').innerHTML = wxGetIc(code, day);
    document.getElementById('wxHeroTemp').textContent = Math.round(c.temperature_2m) + '\u00B0';
    document.getElementById('wxHeroDesc').textContent = day ? wmo.d : wmo.n;
    document.getElementById('wxHeroMeta').innerHTML = '<span class="wx-chip">Voelt als ' + Math.round(c.apparent_temperature) + '\u00B0</span><span class="wx-chip">Wind ' + Math.round(c.wind_speed_10m) + ' km/u</span><span class="wx-chip">Luchtvochtigheid ' + c.relative_humidity_2m + '%</span>';

    document.getElementById('wxIcRise').innerHTML = WX_IC.rise;
    document.getElementById('wxIcSet').innerHTML = WX_IC.set;
    document.getElementById('wxIcAir').innerHTML = WX_IC.wind;
    document.getElementById('wxIcVis').innerHTML = WX_IC.eye;
    document.getElementById('wxSunrise').textContent = sr;
    document.getElementById('wxSunset').textContent = ss;
    var vk = Math.round(c.visibility / 1000);
    document.getElementById('wxVisibility').textContent = vk + ' km';
    document.getElementById('wxVisLabel').textContent = wxViT(vk);
    if (a && a.current) {
      var q = a.current.european_aqi;
      document.getElementById('wxAqi').textContent = q;
      document.getElementById('wxAqiLabel').textContent = wxAqT(q);
    }

    var nowH = parseInt(now.toLocaleString('en-US', {timeZone: ZWOLLE_TZ, hour: '2-digit', hour12: false}));
    var nowD = now.toISOString().split('T')[0];
    var si = w.hourly.time.findIndex(function(t) { return t.startsWith(nowD) && parseInt(t.split('T')[1].split(':')[0]) === nowH; });
    if (si === -1) si = 0;
    var strip = document.getElementById('wxHourlyTrack');
    strip.innerHTML = '';
    for (var i = 0; i < 10; i++) {
      var idx = si + i; if (idx >= w.hourly.time.length) break;
      var t = w.hourly.time[idx], hr = parseInt(t.split('T')[1].split(':')[0]);
      var tmp = Math.round(w.hourly.temperature_2m[idx]), cd = w.hourly.weather_code[idx];
      var rn = w.hourly.precipitation_probability[idx], hd = wxIsHDay(t, sr, ss), isN = i === 0;
      var el = document.createElement('div'); el.className = 'wx-hcell' + (isN ? ' now' : '');
      el.innerHTML = '<span class="wx-hc-t">' + (isN ? 'Nu' : pad(hr) + ':00') + '</span><div class="wx-hc-i">' + wxGetIc(cd, hd) + '</div><span class="wx-hc-tmp">' + tmp + '\u00B0</span>' + (rn > 0 ? '<span class="wx-hc-r">' + rn + '%</span>' : '');
      strip.appendChild(el);
    }
  }).catch(function(e) {
    console.error('[Weer] Weather error:', e);
  });
}

loadWeather();
setInterval(loadWeather, 600000);
</script>
