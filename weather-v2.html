<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weer — Zwolle</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#0a0e17}

/* ===== BACKGROUND PHOTO LAYERS ===== */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background-size:cover;background-position:center;
  transition:opacity 2s ease;
}
#bgCurrent{opacity:1}
#bgNext{opacity:0}

/* Gradient overlay for readability */
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:
    linear-gradient(180deg,
      rgba(0,0,0,0.25) 0%,
      rgba(0,0,0,0.10) 25%,
      rgba(0,0,0,0.20) 55%,
      rgba(0,0,0,0.60) 100%
    );
}
/* Vignette */
.bg-vignette{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse 85% 75% at 50% 45%, transparent 50%, rgba(0,0,0,0.4) 100%);
}

/* Particle canvas */
canvas#fx{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ===== LAYOUT ===== */
.app{
  position:relative;z-index:3;
  height:100vh;width:100vw;
  display:grid;
  grid-template-rows:auto 1fr auto auto;
  padding:clamp(1.2rem,2.5vh,2.5rem) clamp(1.2rem,3vw,3rem);
  gap:clamp(.6rem,1.5vh,1.5rem);
  color:#fff;
}

/* ===== HEADER ===== */
.hdr{display:flex;align-items:center;gap:.7rem}
.hdr-dot{width:7px;height:7px;border-radius:50%;background:#ffa44f;box-shadow:0 0 10px rgba(255,164,79,.5);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-tag{font-size:clamp(.6rem,1vw,.78rem);text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.55);font-weight:600}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.hdr-date{font-family:'Space Mono',monospace;font-size:clamp(.55rem,.9vw,.72rem);color:rgba(255,255,255,.45);font-weight:400}
.hdr-loc{display:flex;align-items:center;gap:.3rem;font-size:clamp(.6rem,1vw,.78rem);color:rgba(255,255,255,.55);font-weight:500}
.hdr-loc svg{width:12px;height:12px;fill:#ffa44f;flex-shrink:0}

/* ===== HERO ===== */
.hero{
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:clamp(.15rem,.6vh,.5rem);
  text-align:center;
}
.hero-icon{
  width:clamp(56px,10vw,110px);height:clamp(56px,10vw,110px);
  filter:drop-shadow(0 6px 25px rgba(0,0,0,.35));
}
.hero-temp{
  font-family:'Space Mono',monospace;
  font-size:clamp(5rem,17vw,15rem);
  font-weight:700;line-height:.88;
  letter-spacing:-.04em;
  text-shadow:0 4px 60px rgba(0,0,0,.3);
}
.hero-desc{
  font-size:clamp(1rem,2.5vw,1.8rem);
  font-weight:300;color:rgba(255,255,255,.85);
  letter-spacing:.02em;
  text-shadow:0 1px 8px rgba(0,0,0,.3);
}
.hero-meta{
  display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(.3rem,.8vw,.6rem);
  margin-top:clamp(.2rem,.4vh,.4rem);
}
.chip{
  display:inline-flex;align-items:center;gap:.25rem;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);
  border-radius:100px;padding:.22em .7em;
  font-size:clamp(.52rem,.95vw,.72rem);color:rgba(255,255,255,.7);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  font-weight:400;
}

/* ===== INFO CARDS ===== */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(.4rem,.9vw,.9rem)}
.card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:clamp(12px,1.4vw,18px);
  padding:clamp(.6rem,1.3vw,1.3rem);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;gap:.2rem;text-align:center;
  transition:background .3s,border-color .3s;
}
.card:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,.2)}
.card-label{font-size:clamp(.46rem,.82vw,.65rem);text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.5);font-weight:600}
.card-icon{font-size:clamp(1rem,2vw,1.6rem);line-height:1;width:1.4em;height:1.4em;display:flex;align-items:center;justify-content:center}
.card-icon svg{width:100%;height:100%}
.card-val{font-family:'Space Mono',monospace;font-size:clamp(.85rem,1.8vw,1.5rem);font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.2)}
.card-sub{font-size:clamp(.42rem,.72vw,.58rem);color:rgba(255,255,255,.5);font-weight:400}

/* ===== HOURLY ===== */
.hourly{display:flex;flex-direction:column;gap:clamp(.25rem,.4vh,.4rem)}
.hourly-title{font-size:clamp(.5rem,.82vw,.7rem);text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.5);font-weight:600}
.hourly-track{
  display:grid;
  grid-template-columns:repeat(var(--hcols,8),1fr);
  gap:clamp(.25rem,.5vw,.5rem);
}
.hcell{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
  border-radius:clamp(10px,1.2vw,14px);
  padding:clamp(.3rem,.6vw,.6rem) clamp(.15rem,.3vw,.3rem);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;gap:.1rem;text-align:center;
  transition:background .3s;
}
.hcell.now{border-color:#ffa44f;background:rgba(255,164,79,0.14)}
.hcell:hover{background:rgba(255,255,255,0.13)}
.hc-t{font-family:'Space Mono',monospace;font-size:clamp(.4rem,.72vw,.58rem);color:rgba(255,255,255,.5)}
.hc-i{width:clamp(16px,1.6vw,24px);height:clamp(16px,1.6vw,24px)}
.hc-i svg{width:100%;height:100%}
.hc-tmp{font-family:'Space Mono',monospace;font-size:clamp(.58rem,1.1vw,.9rem);font-weight:700}
.hc-r{font-size:clamp(.36rem,.62vw,.5rem);color:#6ec6ff;font-weight:400}

/* ===== LOADER ===== */
.loader{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:#0a0e17;transition:opacity 1s}
.loader.off{opacity:0;pointer-events:none}
.ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#ffa44f;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .hourly-track{grid-template-columns:repeat(4,1fr)}
  .hdr-date{display:none}
}
@media(min-aspect-ratio:21/9){
  .hero-temp{font-size:clamp(4rem,13vh,10rem)}
  .hero-icon{width:clamp(44px,7vh,80px);height:clamp(44px,7vh,80px)}
}
</style>
</head>

function getIc(code,day){
  if([0,1].includes(code))return day?IC.sun:IC.moon;
  if(code===2)return IC.pcloudy;if(code===3)return IC.cloud;
  if([45,48].includes(code))return IC.fog;
  if([51,53,55,56,57].includes(code))return IC.drizzle;
  if([61,63,80,81].includes(code))return IC.rain;
  if([65,66,67,82].includes(code))return IC.heavyRain;
  if([95,96,99].includes(code))return IC.storm;
  if([71,73,75,77,85,86].includes(code))return IC.snow;
  return day?IC.sun:IC.moon;
}

/* ==========================================
   PARTICLES
   ========================================== */
const cvs=document.getElementById('fx'),ctx=cvs.getContext('2d');
let parts=[],pType='none',raf;
function rsz(){cvs.width=innerWidth;cvs.height=innerHeight}
addEventListener('resize',rsz);rsz();

function pFor(code){
  if([51,53,55,56,57,61,63,80,81].includes(code))return'rain';
  if([65,66,67,82,95,96,99].includes(code))return'heavyRain';
  if([71,73,75,77,85,86].includes(code))return'snow';
  if([45,48].includes(code))return'fog';
  return'none';
}
function mkParts(type){
  parts=[];pType=type;const w=cvs.width,h=cvs.height;
  if(type==='rain')for(let i=0;i<100;i++)parts.push({x:Math.random()*w,y:Math.random()*h,l:Math.random()*16+8,s:Math.random()*5+4,o:Math.random()*.25+.12});
  else if(type==='heavyRain')for(let i=0;i<200;i++)parts.push({x:Math.random()*w,y:Math.random()*h,l:Math.random()*22+10,s:Math.random()*8+6,o:Math.random()*.3+.18});
  else if(type==='snow')for(let i=0;i<70;i++)parts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*3+1,s:Math.random()*.8+.2,d:Math.random()*Math.PI*2,o:Math.random()*.45+.25});
  else if(type==='fog')for(let i=0;i<6;i++)parts.push({x:Math.random()*w,y:Math.random()*h*.5+h*.25,r:Math.random()*180+120,s:Math.random()*.25+.08,o:Math.random()*.05+.015,dx:Math.random()>.5?1:-1});
}
function drw(){
  ctx.clearRect(0,0,cvs.width,cvs.height);const w=cvs.width,h=cvs.height;
  if(pType==='rain'||pType==='heavyRain')parts.forEach(p=>{ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-1.2,p.y+p.l);ctx.strokeStyle=`rgba(180,210,240,${p.o})`;ctx.lineWidth=1;ctx.stroke();p.y+=p.s;p.x-=.25;if(p.y>h){p.y=-p.l;p.x=Math.random()*w}});
  else if(pType==='snow')parts.forEach(p=>{p.d+=.008;ctx.beginPath();ctx.arc(p.x+Math.sin(p.d)*25,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.o})`;ctx.fill();p.y+=p.s;if(p.y>h){p.y=-8;p.x=Math.random()*w}});
  else if(pType==='fog')parts.forEach(p=>{ctx.beginPath();const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,`rgba(200,210,220,${p.o})`);g.addColorStop(1,'rgba(200,210,220,0)');ctx.fillStyle=g;ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.s*p.dx;if(p.x>w+p.r)p.x=-p.r;if(p.x<-p.r)p.x=w+p.r});
  raf=requestAnimationFrame(drw);
}

/* ==========================================
   CROSSFADE BG
   ========================================== */
let curBg=null;
function setBg(url){
  if(url===curBg)return;curBg=url;
  const img=new Image();
  img.onload=()=>{
    const n=document.getElementById('bgNext'),c=document.getElementById('bgCurrent');
    n.style.backgroundImage=`url(${url})`;n.style.opacity='1';
    setTimeout(()=>{c.style.backgroundImage=`url(${url})`;n.style.opacity='0'},2200);
  };
  img.src=url;
}

/* ==========================================
   WMO
   ========================================== */
const WMO={0:{d:'Onbewolkt',n:'Helder'},1:{d:'Licht bewolkt',n:'Licht bewolkt'},2:{d:'Half bewolkt',n:'Half bewolkt'},3:{d:'Bewolkt',n:'Bewolkt'},45:{d:'Mist',n:'Mist'},48:{d:'Rijpmist',n:'Rijpmist'},51:{d:'Lichte motregen',n:'Lichte motregen'},53:{d:'Motregen',n:'Motregen'},55:{d:'Dichte motregen',n:'Dichte motregen'},56:{d:'IJzel (licht)',n:'IJzel (licht)'},57:{d:'IJzel',n:'IJzel'},61:{d:'Lichte regen',n:'Lichte regen'},63:{d:'Regen',n:'Regen'},65:{d:'Zware regen',n:'Zware regen'},66:{d:'IJsregen (licht)',n:'IJsregen (licht)'},67:{d:'IJsregen',n:'IJsregen'},71:{d:'Lichte sneeuw',n:'Lichte sneeuw'},73:{d:'Sneeuw',n:'Sneeuw'},75:{d:'Zware sneeuw',n:'Zware sneeuw'},77:{d:'Sneeuwkorrels',n:'Sneeuwkorrels'},80:{d:'Lichte buien',n:'Lichte buien'},81:{d:'Buien',n:'Buien'},82:{d:'Zware buien',n:'Zware buien'},85:{d:'Lichte sneeuwbuien',n:'Lichte sneeuwbuien'},86:{d:'Sneeuwbuien',n:'Sneeuwbuien'},95:{d:'Onweer',n:'Onweer'},96:{d:'Onweer met hagel',n:'Onweer met hagel'},99:{d:'Zwaar onweer',n:'Zwaar onweer'}};

/* ==========================================
   UTIL
   ========================================== */
const pad=n=>String(n).padStart(2,'0');
const NLD=['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const NLM=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
function isDayNow(sr,ss){const now=new Date(),h=+now.toLocaleString('en-US',{timeZone:TZ,hour:'2-digit',hour12:false}),m=+now.toLocaleString('en-US',{timeZone:TZ,minute:'2-digit'}),t=h*60+m,[sh,sm]=sr.split(':').map(Number),[eh,em]=ss.split(':').map(Number);return t>=(sh*60+sm)&&t<(eh*60+em)}
function isHDay(s,sr,ss){const h=+s.split('T')[1].split(':')[0],[sh]=sr.split(':').map(Number),[eh]=ss.split(':').map(Number);return h>=sh&&h<eh}
function aqT(v){if(v<=20)return'Uitstekend';if(v<=40)return'Goed';if(v<=60)return'Matig';if(v<=80)return'Slecht';return'Zeer slecht'}
function viT(k){if(k>=10)return'Helder';if(k>=4)return'Matig';if(k>=1)return'Beperkt';return'Slecht'}
function hC(){const w=innerWidth;if(w<500)return 4;if(w<800)return 6;if(w<1200)return 8;return 10}

/* ==========================================
   MAIN
   ========================================== */
async function load(){
  try{
    const[wR,aR]=await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,visibility&hourly=temperature_2m,weather_code,precipitation_probability&daily=sunrise,sunset&timezone=Europe%2FAmsterdam&forecast_days=2`),
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${LAT}&longitude=${LON}&current=european_aqi&timezone=Europe%2FAmsterdam`)
    ]);
    const w=await wR.json(),a=await aR.json(),c=w.current;
    const sr=w.daily.sunrise[0].split('T')[1],ss=w.daily.sunset[0].split('T')[1];
    const day=isDayNow(sr,ss),code=c.weather_code,wmo=WMO[code]||WMO[0];

    // BG photo
    setBg(photoUrl(code,day));

    // Particles
    const pt=pFor(code);if(raf)cancelAnimationFrame(raf);mkParts(pt);
    if(pt!=='none')drw();else ctx.clearRect(0,0,cvs.width,cvs.height);

    // Date
    const now=new Date(),dI=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'].indexOf(now.toLocaleString('en-US',{timeZone:TZ,weekday:'long'}).toLowerCase());
    const dN=now.toLocaleString('en-US',{timeZone:TZ,day:'numeric'}),mI=+now.toLocaleString('en-US',{timeZone:TZ,month:'numeric'})-1;
    document.getElementById('dateStr').textContent=`${NLD[dI]} ${dN} ${NLM[mI]}`;

    // Hero
    document.getElementById('heroIcon').innerHTML=getIc(code,day);
    document.getElementById('heroTemp').textContent=`${Math.round(c.temperature_2m)}\u00B0`;
    document.getElementById('heroDesc').textContent=day?wmo.d:wmo.n;
    document.getElementById('heroMeta').innerHTML=`<span class="chip">Voelt als ${Math.round(c.apparent_temperature)}\u00B0</span><span class="chip">Wind ${Math.round(c.wind_speed_10m)} km/u</span><span class="chip">Luchtvochtigheid ${c.relative_humidity_2m}%</span>`;

    // Cards
    document.getElementById('icRise').innerHTML=IC.rise;
    document.getElementById('icSet').innerHTML=IC.set;
    document.getElementById('icAir').innerHTML=IC.wind;
    document.getElementById('icVis').innerHTML=IC.eye;
    document.getElementById('sunrise').textContent=sr;
    document.getElementById('sunset').textContent=ss;
    const vk=Math.round(c.visibility/1000);
    document.getElementById('visibility').textContent=`${vk} km`;
    document.getElementById('visLabel').textContent=viT(vk);
    if(a&&a.current){const q=a.current.european_aqi;document.getElementById('aqi').textContent=q;document.getElementById('aqiLabel').textContent=aqT(q)}
    else document.getElementById('aqi').textContent='N/A';

    // Hourly
    const cols=hC();document.documentElement.style.setProperty('--hcols',cols);
    const nowH=+now.toLocaleString('en-US',{timeZone:TZ,hour:'2-digit',hour12:false}),nowD=now.toISOString().split('T')[0];
    let si=w.hourly.time.findIndex(t=>{const h=+t.split('T')[1].split(':')[0];return t.startsWith(nowD)&&h===nowH});
    if(si===-1)si=0;
    const strip=document.getElementById('hourlyTrack');strip.innerHTML='';
    for(let i=0;i<cols;i++){
      const idx=si+i;if(idx>=w.hourly.time.length)break;
      const t=w.hourly.time[idx],hr=+t.split('T')[1].split(':')[0],tmp=Math.round(w.hourly.temperature_2m[idx]),cd=w.hourly.weather_code[idx],rn=w.hourly.precipitation_probability[idx],hd=isHDay(t,sr,ss),isN=i===0;
      const el=document.createElement('div');el.className='hcell'+(isN?' now':'');
      el.innerHTML=`<span class="hc-t">${isN?'Nu':pad(hr)+':00'}</span><div class="hc-i">${getIc(cd,hd)}</div><span class="hc-tmp">${tmp}\u00B0</span>${rn>0?`<span class="hc-r">${rn}%</span>`:''}`;
      strip.appendChild(el);
    }

    document.getElementById('loader').classList.add('off');
  }catch(e){console.error(e);document.getElementById('heroDesc').textContent='Fout bij laden';document.getElementById('loader').classList.add('off')}
}

load();
setInterval(load,600000);
addEventListener('resize',()=>{rsz();document.documentElement.style.setProperty('--hcols',hC())});
</script>
</body>
</html>
