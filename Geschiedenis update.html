<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vandaag in de Geschiedenis</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#000;color:#fff;cursor:none}
::-webkit-scrollbar{display:none}

body{font-family:'Georgia','Times New Roman',serif;background:linear-gradient(135deg,#1e3c72 0%,#2a5298 50%,#7e22ce 100%);overflow:hidden}
.gs-wrap{padding:3vh 3vw;height:100%;display:flex;flex-direction:column}
.gs-hdr{text-align:center;margin-bottom:3vh}
.gs-date{font-size:clamp(18px,2vw,32px);opacity:0.9;margin-bottom:1.5vh;letter-spacing:0.15em;text-transform:uppercase;font-weight:300}
.gs-h1{font-size:clamp(32px,4.5vw,72px);font-weight:700;margin-bottom:1vh;text-shadow:3px 3px 6px rgba(0,0,0,0.4)}
.gs-sub{font-size:clamp(16px,1.8vw,28px);opacity:0.85;font-style:italic}
.gs-featured{background:rgba(255,255,255,0.18);backdrop-filter:blur(15px);border-radius:24px;padding:clamp(30px,3vh,50px) clamp(40px,4vw,60px);margin-bottom:2.5vh;border:2px solid rgba(255,255,255,0.3);box-shadow:0 15px 40px rgba(0,0,0,0.4)}
.gs-feat-label{font-size:clamp(14px,1.2vw,18px);text-transform:uppercase;letter-spacing:0.2em;opacity:0.8;margin-bottom:2vh;color:#fbbf24;font-weight:600}
.gs-feat-year{font-size:clamp(40px,5vw,80px);font-weight:bold;margin-bottom:2vh;background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gs-feat-desc{font-size:clamp(20px,2.2vw,36px);line-height:1.6;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;font-weight:400}
.gs-others{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(15px,1.5vw,25px);flex:1}
.gs-mini{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border-radius:16px;padding:clamp(15px,2vh,25px);border-left:5px solid;display:flex;flex-direction:column}
.gs-mini.ancient{border-color:#fbbf24}
.gs-mini.modern{border-color:#60a5fa}
.gs-mini.recent{border-color:#34d399}
.gs-mini.birthday{border-color:#f472b6}
.gs-mini-cat{font-size:clamp(28px,2.5vw,42px);margin-bottom:1vh;font-weight:bold;opacity:0.95;text-shadow:1px 1px 2px rgba(0,0,0,0.3)}
.gs-mini-year{font-size:clamp(18px,1.8vw,28px);font-weight:bold;margin-bottom:1vh;opacity:0.95}
.gs-mini-desc{font-size:clamp(14px,1.2vw,18px);line-height:1.5;opacity:0.9;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;flex:1}
.gs-special{background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%);padding:clamp(15px,2vh,25px) clamp(20px,3vw,40px);border-radius:16px;margin-top:2vh;text-align:center;box-shadow:0 8px 20px rgba(251,191,36,0.3);display:none}
.gs-special.visible{display:block}
.gs-special-label{font-size:clamp(14px,1.2vw,18px);text-transform:uppercase;letter-spacing:0.15em;opacity:0.9;margin-bottom:0.5vh;font-weight:600;color:rgba(0,0,0,0.7)}
.gs-special-name{font-size:clamp(22px,2.5vw,38px);font-weight:bold;color:#1e3c72;text-shadow:1px 1px 2px rgba(255,255,255,0.5)}
.gs-foot{text-align:center;margin-top:2vh;padding-top:2vh;opacity:0.6;font-size:clamp(12px,1vw,16px);display:flex;justify-content:center;align-items:center;gap:2vw}
.gs-dots{display:flex;gap:8px;align-items:center}
.gs-dot{width:clamp(8px,0.8vw,12px);height:clamp(8px,0.8vw,12px);border-radius:50%;background:rgba(255,255,255,0.3)}
.gs-dot.active{background:#fbbf24;transform:scale(1.3)}
.gs-loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:2vh}
.gs-spinner{width:5vh;height:5vh;border:0.3vh solid rgba(255,255,255,0.2);border-top-color:#fbbf24;border-radius:50%;animation:gsSpin 0.8s linear infinite}
@keyframes gsSpin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="gs-wrap">
  <div class="gs-hdr">
    <div class="gs-date" id="gsDate"></div>
    <h1 class="gs-h1">Vandaag in de Geschiedenis</h1>
    <div class="gs-sub">De belangrijkste gebeurtenissen op deze dag</div>
  </div>
  <div id="gsMain">
    <div class="gs-loading">
      <div class="gs-spinner"></div>
      <div style="font-size:clamp(16px,1.5vw,24px);opacity:0.7">Historische gebeurtenissen laden...</div>
    </div>
  </div>
  <div class="gs-special" id="gsSpecial">
    <div class="gs-special-label">Vandaag is het ook...</div>
    <div class="gs-special-name" id="gsSpecialName"></div>
  </div>
  <div class="gs-foot">
    <div>Bron: Wikipedia - Automatisch bijgewerkt</div>
    <div class="gs-dots" id="gsDots"></div>
  </div>
</div>

<script>
var GS_SPECIAL_DAYS = {"1-1":"Nieuwjaarsdag","1-27":"Internationale Holocaustherdenkingsdag","2-14":"Valentijnsdag","3-8":"Internationale Vrouwendag","3-14":"Pi Dag (3.14)","3-20":"Internationale Dag van het Geluk","4-1":"1 April (Gekkendag)","4-7":"Wereld Gezondheidsdag","4-22":"Dag van de Aarde","4-27":"Koningsdag","5-1":"Dag van de Arbeid","5-4":"Dodenherdenking","5-5":"Bevrijdingsdag","6-5":"Wereld Milieu Dag","6-20":"Wereld Vluchtelingen Dag","6-21":"Langste Dag","7-4":"Amerikaanse Onafhankelijkheidsdag","7-18":"Nelson Mandela Internationale Dag","8-15":"VJ-Day (Einde WO2 Azie)","9-21":"Internationale Dag van de Vrede","10-4":"Dierendag","10-31":"Halloween","11-9":"Herdenking Val van de Berlijnse Muur","11-11":"Sint-Maarten","12-5":"Sinterklaas","12-10":"Dag van de Rechten van de Mens","12-21":"Kortste Dag van het Jaar","12-24":"Kerstavond","12-25":"1e Kerstdag","12-26":"2e Kerstdag","12-31":"Oudejaarsavond"};
var gsEvents = [], gsRotation = 0, gsRotInterval = null;

function gsGetEra(year) {
  if (year < 1500) return 'ancient';
  if (year < 1950) return 'modern';
  return 'recent';
}

function gsCatSymbol(era) {
  if (era === 'ancient') return '&#9670;';
  if (era === 'modern') return '&#9733;';
  if (era === 'recent') return '&#9679;';
  if (era === 'birthday') return '&#9734;';
  return '&#9670;';
}

function gsEscHtml(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function gsDisplay() {
  var mc = document.getElementById('gsMain');
  if (!gsEvents.length) { mc.innerHTML = '<div class="gs-loading"><div style="font-size:clamp(16px,1.5vw,24px);opacity:0.7">Geen gebeurtenissen gevonden</div></div>'; return; }
  var si = gsRotation * 4;
  var cur = gsEvents.slice(si, si + 4);
  if (!cur.length) { gsRotation = 0; cur = gsEvents.slice(0, 4); }
  var feat = cur[0], others = cur.slice(1);
  var yd = feat.year; if (yd < 0) yd = Math.abs(yd) + ' v.Chr.';
  var fl = feat.type === 'birthday' ? '&#9734; Geboren op deze dag' : '&#9733; Hoogtepunt van de dag';
  var html = '<div class="gs-featured"><div class="gs-feat-label">' + fl + '</div><div class="gs-feat-year">' + yd + '</div><div class="gs-feat-desc">' + gsEscHtml(feat.description) + '</div></div>';
  if (others.length) {
    html += '<div class="gs-others">';
    others.forEach(function(ev) {
      var yr = ev.year; if (yr < 0) yr = Math.abs(yr) + ' v.Chr.';
      html += '<div class="gs-mini ' + ev.era + '"><div class="gs-mini-cat">' + ev.category + '</div><div class="gs-mini-year">' + yr + '</div><div class="gs-mini-desc">' + gsEscHtml(ev.description) + '</div></div>';
    });
    html += '</div>';
  }
  mc.innerHTML = html;
  var total = Math.ceil(gsEvents.length / 4);
  var dots = document.getElementById('gsDots');
  var dhtml = '';
  for (var i = 0; i < total; i++) dhtml += '<div class="gs-dot' + (i === gsRotation ? ' active' : '') + '"></div>';
  dots.innerHTML = dhtml;
}

function gsRotate() { gsRotation = (gsRotation + 1) % Math.ceil(gsEvents.length / 4); gsDisplay(); }

function gsInit() {
  var now = new Date();
  var month = now.getMonth() + 1, day = now.getDate();
  var dateKey = month + '-' + day;

  document.getElementById('gsDate').textContent = now.toLocaleDateString('nl-NL', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});

  var sp = document.getElementById('gsSpecial');
  if (GS_SPECIAL_DAYS[dateKey]) {
    document.getElementById('gsSpecialName').textContent = GS_SPECIAL_DAYS[dateKey];
    sp.classList.add('visible');
  }

  var mm = String(month).padStart(2, '0'), dd = String(day).padStart(2, '0');
  Promise.allSettled([
    fetch('https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/' + mm + '/' + dd, {headers: {'Api-User-Agent': 'YodeckSignage/1.0'}}),
    fetch('https://en.wikipedia.org/api/rest_v1/feed/onthisday/births/' + mm + '/' + dd, {headers: {'Api-User-Agent': 'YodeckSignage/1.0'}})
  ]).then(function(results) {
    var events = [], births = [];
    if (results[0].status === 'fulfilled' && results[0].value.ok) {
      return results[0].value.json().then(function(data) {
        if (data.events) events = data.events.slice(0, 14).map(function(e) { var era = gsGetEra(e.year || 0); return {year: e.year || 0, description: e.text || '', era: era, category: gsCatSymbol(era), type: 'event'}; });
        if (results[1].status === 'fulfilled' && results[1].value.ok) {
          return results[1].value.json().then(function(d2) {
            if (d2.births) births = d2.births.filter(function(b) { return b.pages && b.pages.length; }).slice(0, 6).map(function(b) { return {year: b.year || 0, description: b.text || '', era: 'birthday', category: '&#9734;', type: 'birthday'}; });
            var mixed = [], ei = 0, bi = 0;
            while (ei < events.length || bi < births.length) {
              for (var k = 0; k < 3 && ei < events.length; k++) mixed.push(events[ei++]);
              if (bi < births.length) mixed.push(births[bi++]);
            }
            for (var i = mixed.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = mixed[i]; mixed[i] = mixed[j]; mixed[j] = t; }
            gsEvents = mixed;
            gsRotation = 0;
            gsDisplay();
          });
        }
        gsEvents = events;
        gsDisplay();
      });
    }
  }).catch(function(e) { console.error('[Geschiedenis] error:', e); });

  if (gsRotInterval) clearInterval(gsRotInterval);
  gsRotInterval = setInterval(gsRotate, 30000);
}

gsInit();
</script>
</body>
</html>
